model: gpt-5.4
label:
  zh_Hans: gpt-5.4
  en_US: gpt-5.4
model_type: llm
features:
  - multi-tool-call
  - agent-thought
  - stream-tool-call
  - vision
model_properties:
  mode: chat
  context_size: 272000
parameter_rules:
  - name: response_format
    label:
      zh_Hans: 回复格式
      en_US: Response Format
    type: string
    help:
      zh_Hans: 指定模型必须输出的格式。
      en_US: Specify the required output format.
    required: false
    options:
      - text
      - json_schema
  - name: json_schema
    use_template: json_schema
  - name: reasoning_effort
    label:
      zh_Hans: 推理努力程度
      en_US: Reasoning Effort
    type: string
    help:
      zh_Hans: 约束推理模型的推理努力程度。支持 low、medium、high、xhigh。
      en_US: Constrains reasoning effort. Supported values are low, medium, high, and xhigh.
    required: false
    default: medium
    options:
      - low
      - medium
      - high
      - xhigh
  - name: verbosity
    label:
      zh_Hans: 详细程度
      en_US: Verbosity
    type: string
    help:
      zh_Hans: 约束模型响应的详细程度。支持 low、medium、high。
      en_US: Constrains the verbosity of the model response. Supported values are low, medium, and high.
    required: false
    default: low
    options:
      - low
      - medium
      - high
  - name: enable_web_search
    label:
      zh_Hans: 启用 WebSearch
      en_US: Enable WebSearch
    type: boolean
    help:
      zh_Hans: 为模型附加 Codex Responses API 的 `web_search` 内建工具。
      en_US: Attach the Codex Responses API built-in `web_search` tool for the model.
    required: true
    default: false
  - name: enable_stream
    label:
      zh_Hans: 流式响应
      en_US: Streaming
    type: boolean
    help:
      zh_Hans: 若你的 ChatGPT 订阅或代理环境不支持流式输出，请关闭此选项。
      en_US: Disable this if your ChatGPT subscription or proxy does not support streaming responses.
    required: true
    default: true
pricing:
  input: "0.00"
  output: "0.00"
  unit: "0.000001"
  currency: USD
